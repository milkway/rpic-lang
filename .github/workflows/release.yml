name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  binaries:
    name: binary (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, target: x86_64-unknown-linux-gnu }
          - { os: macos-latest, target: aarch64-apple-darwin }
          - { os: macos-latest, target: x86_64-apple-darwin }
          - { os: windows-latest, target: x86_64-pc-windows-msvc }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build
        run: cargo build --release -p rpic-cli --target ${{ matrix.target }}
      - name: Archive (unix)
        if: runner.os != 'Windows'
        run: tar -czf "rpic-${{ matrix.target }}.tar.gz" -C "target/${{ matrix.target }}/release" rpic
      - name: Archive (windows)
        if: runner.os == 'Windows'
        run: Compress-Archive "target/${{ matrix.target }}/release/rpic.exe" "rpic-${{ matrix.target }}.zip"
      - name: Upload to release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            rpic-${{ matrix.target }}.tar.gz
            rpic-${{ matrix.target }}.zip

  deb:
    name: debian package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo install cargo-deb
      - run: cargo deb -p rpic-cli
      - name: Upload to release
        uses: softprops/action-gh-release@v3
        with:
          files: target/debian/*.deb

  # Windows MSI (optional): cargo-wix
  msi:
    name: windows msi
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo install cargo-wix
      - run: cargo wix --nocapture -p rpic-cli
        continue-on-error: true
      - name: Upload to release
        uses: softprops/action-gh-release@v3
        with:
          files: target/wix/*.msi
        continue-on-error: true
