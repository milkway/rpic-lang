name: R

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  check:
    name: R CMD check (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
      - uses: dtolnay/rust-toolchain@stable
      - name: Vendor Rust dependencies
        run: |
          Rscript -e 'install.packages("rextendr")'
          Rscript -e 'rextendr::vendor_pkgs("bindings/r")'
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          working-directory: bindings/r
          extra-packages: any::rcmdcheck
      - uses: r-lib/actions/check-r-package@v2
        with:
          working-directory: bindings/r

  tarball:
    name: source tarball
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-r@v2
      - uses: dtolnay/rust-toolchain@stable
      - name: Vendor and build
        run: |
          Rscript -e 'install.packages("rextendr")'
          Rscript -e 'rextendr::vendor_pkgs("bindings/r")'
          R CMD build bindings/r
      - name: Attach source package to the release
        uses: softprops/action-gh-release@v2
        with:
          files: rpic_*.tar.gz
