name: Docs

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'tools/highlight/**'
      - 'crates/**'
      - 'assets/logo.pic'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build rpic (renders the live examples)
        run: cargo build --release -p rpic-cli
      - name: Build site
        working-directory: site
        env:
          RPIC_BIN: ${{ github.workspace }}/target/release/rpic
        run: |
          npm ci
          npm run build
      - uses: actions/upload-pages-artifact@v5
        with:
          path: site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
