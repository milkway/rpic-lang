name: npm

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  publish:
    name: publish to npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # npm Trusted Publishing (OIDC) + provenance
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: wasm-pack
      - uses: actions/setup-node@v6
        with:
          # Node 24 bundles npm 11.13+, which supports OIDC Trusted Publishing
          # and provenance out of the box. Do NOT `npm install -g npm@latest`
          # here: the in-place self-upgrade drops npm's bundled `sigstore`
          # module, so `--provenance` then dies with `Cannot find module
          # 'sigstore'`. Use the bundled npm instead — it has sigstore intact.
          node-version: 24
          registry-url: https://registry.npmjs.org
      - name: Publish (wasm built by prepack; auth via OIDC, no token)
        working-directory: bindings/js
        run: npm publish --access public --provenance
