name: crates.io

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  publish:
    name: publish to crates.io
    runs-on: ubuntu-latest
    # Optional gate: add protection rules (required reviewers, tag restriction)
    # to the `crates-io` environment in repo settings. Auto-created, no-op if left
    # unprotected.
    environment: crates-io
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish crates in dependency order
        # The token is scoped to this step only — checkout/toolchain never see it.
        # rpic-wasm is intentionally excluded (npm-only, path-only dep).
        # cargo publish blocks until each version appears in the index, so the
        # next crate's verify build can resolve it from crates.io.
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -uo pipefail
          publish() {
            local crate="$1" out
            echo "::group::cargo publish -p $crate"
            if out=$(cargo publish -p "$crate" 2>&1); then
              echo "$out"
            else
              echo "$out"
              if echo "$out" | grep -qiE "already (exists|uploaded)|is already (uploaded|published)"; then
                echo "-> $crate already on crates.io at this version, skipping"
              else
                echo "::endgroup::"
                return 1
              fi
            fi
            echo "::endgroup::"
          }
          for crate in rpic-core rpic-render rpic-capi rpic-cli; do
            publish "$crate" || exit 1
          done
