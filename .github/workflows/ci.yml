name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  site:
    name: docs site (live examples)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build rpic
        run: cargo build --release -p rpic-cli
      - name: Build site (renders every example with the branch engine)
        working-directory: site
        env:
          RPIC_BIN: ${{ github.workspace }}/target/release/rpic
        run: |
          npm ci
          npm run build

  highlight-grammar:
    name: highlight grammar
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Test rpic TextMate grammar (Shiki)
        working-directory: tools/highlight
        run: |
          npm ci
          npm test

  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Test
        run: cargo test --workspace
      - name: Build release binary
        run: cargo build --release -p rpic-cli

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets -- -D warnings

  bindings:
    name: build bindings (wasm + python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: taiki-e/install-action@v2
        with:
          tool: wasm-pack
      - name: Build JS WASM package
        working-directory: bindings/js
        run: npm run build:wasm
      - name: Test JS wrapper
        working-directory: bindings/js
        run: npm test
      - name: Build Python wheel
        uses: PyO3/maturin-action@v1
        with:
          working-directory: bindings/python
          command: build
      - name: Test Python wheel
        working-directory: bindings/python
        run: |
          python3 -m venv .venv
          .venv/bin/pip install --quiet pytest target/wheels/*.whl
          .venv/bin/pytest tests -q
