ShortDescription: The pic graphics language rendered to SVG, PNG and PDF.
Description: |-
  rpic is a modern reimplementation of Brian Kernighan's pic picture-drawing
  language, written in Rust. You describe a diagram in a small, English-like
  language and rpic renders it to SVG, PNG or PDF with no system dependencies.
  It adds a declarative animation layer that plays in the browser via GSAP, and
  ships a native circuit-element library (resistors, transistors, logic gates,
  op-amps, meters and more). The same engine powers a CLI, WebAssembly, and
  Python, R and JavaScript/TypeScript bindings.
