ReleaseNotes: |-
  pic-to-SVG/PNG/PDF rendering with a faithful engine (relative positioning,
  corners, ordinals, blocks, macros, chop, scale, same, continue, general arcs),
  GSAP animation manifests, and a 79-element circuit library (enable with -c).
